<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Pixel-art terminal frame -->
  <rect x="2" y="2" width="20" height="20" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <line x1="2" y1="6" x2="22" y2="6" stroke="currentColor" stroke-width="1"/>
  <!-- Title bar dots -->
  <circle cx="5" cy="4" r="0.8" fill="currentColor"/>
  <circle cx="7.5" cy="4" r="0.8" fill="currentColor"/>
  <circle cx="10" cy="4" r="0.8" fill="currentColor"/>
  <!-- Pixel-art R -->
  <rect x="6" y="9" width="2" height="10" fill="currentColor"/>
  <rect x="8" y="9" width="4" height="2" fill="currentColor"/>
  <rect x="12" y="9" width="2" height="2" fill="currentColor"/>
  <rect x="12" y="11" width="2" height="2" fill="currentColor"/>
  <rect x="8" y="13" width="4" height="2" fill="currentColor"/>
  <rect x="10" y="15" width="2" height="2" fill="currentColor"/>
  <rect x="12" y="17" width="2" height="2" fill="currentColor"/>
  <!-- Cursor blink line -->
  <rect x="16" y="17" width="3" height="2" fill="currentColor" opacity="0.6"/>
</svg>
